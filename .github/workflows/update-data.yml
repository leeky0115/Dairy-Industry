name: 낙농 데이터 자동 갱신

on:
  schedule:
    - cron: '0 1 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: KOSIS 데이터 호출
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
        run: python scripts/fetch_kosis.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/dairyData.json
          git diff --staged --quiet || git commit -m "자동 갱신: $(date '+%Y년 %m월') 낙농 통계 업데이트"
          git push
