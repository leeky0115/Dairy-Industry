name: 낙농 데이터 자동 갱신

on:
  schedule:
    - cron: '0 1 1 * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests

      - name: KOSIS + KAMIS 데이터 호출
        env:
          KOSIS_API_KEY: ${{ secrets.KOSIS_API_KEY }}
          KAMIS_API_KEY: ${{ secrets.KAMIS_API_KEY }}
          KAMIS_ID: ${{ secrets.KAMIS_ID }}
        run: python scripts/fetch_kosis.py

      - name: 변경사항 커밋 & 푸시
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "자동 갱신: 낙농 통계 업데이트"
          file_pattern: src/data/dairyData.json
